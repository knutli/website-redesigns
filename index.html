<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Redesigns</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 90%; padding: 3rem 0; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; color: #fff; }
        .projects { display: flex; flex-direction: column; gap: 1rem; }
        a { display: block; padding: 1.25rem 1.5rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: #e0e0e0; text-decoration: none; transition: all 0.2s ease; }
        a:hover { background: #222; border-color: #444; transform: translateY(-2px); }
        .name { font-weight: 600; font-size: 1.1rem; color: #fff; }
        .desc { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Redesigns</h1>
        <div class="projects">
            <a href="morstol/">
                <div class="name">Morstøl</div>
                <div class="desc">Bygg og Snekkermester Birger Morstøl AS — Bergen</div>
            </a>
        </div>
    </div>
</body>
</html>
